<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>Pitch Trainer</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      background: #111; color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    html { overflow-y: auto; }
    body {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: calc(env(safe-area-inset-top) + 4.5rem) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 3rem) env(safe-area-inset-left);
      user-select: none; -webkit-user-select: none;
    }

    /* ---- Mode toggle ---- */
    #mode-toggle {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 0.8rem);
      left: 0; right: 0;
      display: flex; gap: 0.5rem;
      z-index: 10;
      justify-content: flex-start;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 0 1rem;
      white-space: nowrap;
    }
    #mode-toggle::-webkit-scrollbar { display: none; }
    .mode-btn { flex: 0 0 auto; }
    .mode-btn, .submode-btn {
      padding: 0.45rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      border: 2px solid #444;
      border-radius: 999px;
      background: transparent;
      color: #888;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .mode-btn.active, .submode-btn.active {
      background: #eee; color: #111; border-color: #eee;
    }

    /* ---- Shared note display ---- */
    #note {
      font-size: 10rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      min-height: 1em;
      text-align: center;
      color: #fff;
    }
    #note.idle { color: #333; }
    body.quiz-mode #note { font-size: 6.5rem; }

    #debug {
      margin-top: 1.2rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85rem;
      color: #666;
      text-align: center;
      line-height: 1.5;
    }

    /* ---- Passive ---- */
    #start {
      margin-top: 2rem;
      padding: 1.25rem 2.5rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: #111;
      background: #eee;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      touch-action: manipulation;
    }
    #start:disabled { opacity: 0.4; }
    #start.hidden { display: none; }

    /* ---- Quiz ---- */
    #quiz {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      margin-top: 0.3rem;
      width: 100%;
      max-width: 460px;
      padding: 0 1rem;
    }
    #quiz.active { display: flex; }

    #quiz-submodes {
      display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center;
    }

    #quiz-score {
      font-size: 0.95rem;
      color: #888;
      min-height: 1.3em;
    }
    #quiz-result {
      font-size: 0.95rem;
      font-weight: 600;
      min-height: 1.4em;
      text-align: center;
      line-height: 1.35;
      color: #ddd;
    }
    #quiz-result.correct { color: #4caf50; }
    #quiz-result.wrong   { color: #f44336; }

    .answer-group {
      display: none;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .answer-group.active { display: flex; }

    .answer-btn {
      padding: 0.85rem 1.3rem;
      font-size: 1rem;
      font-weight: 600;
      border: 2px solid #555;
      border-radius: 999px;
      background: transparent;
      color: #eee;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.1s, border-color 0.1s;
    }
    .answer-btn:active   { background: #333; }
    .answer-btn:disabled { opacity: 0.3; cursor: default; }
    .answer-btn.small    {
      padding: 0.55rem 0.55rem;
      font-size: 0.9rem;
      min-width: 0;
    }
    .amount-btn { min-width: 3.4rem; }

    /* ---- Follow-up (Pitch mode) ---- */
    #followup {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      padding-top: 0.6rem;
      border-top: 1px solid #2a2a2a;
    }
    #followup.active { display: flex; }
    .followup-label {
      color: #aaa;
      font-size: 0.9rem;
    }
    #followup-btns {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 0.35rem;
      width: 100%;
      max-width: 360px;
    }

    #quiz-actions { display: flex; gap: 1.4rem; margin-top: 0.2rem; }
    .ghost {
      font-size: 0.85rem;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      touch-action: manipulation;
      text-decoration: underline;
      padding: 0.4rem;
    }
    #quiz-next { visibility: hidden; }
    #quiz-next.visible { visibility: visible; }

    /* ---- Intervals ---- */
    #intervals {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.3rem;
      width: 100%;
      max-width: 460px;
      padding: 0 1rem;
    }
    #intervals.active { display: flex; }
    #intervals-controls .ctl-label {
      display: flex; align-items: center; gap: 0.5rem;
      color: #aaa; font-size: 0.9rem;
    }
    #interval-type {
      background: #1a1a1a;
      color: #eee;
      border: 2px solid #555;
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      font-size: 0.9rem;
      font-family: inherit;
      touch-action: manipulation;
    }
    #intervals-score {
      font-size: 0.95rem; color: #888; min-height: 1.3em;
    }
    #intervals-result {
      font-size: 0.95rem; font-weight: 600;
      min-height: 1.4em; text-align: center; line-height: 1.35; color: #ddd;
    }
    #intervals-result.correct { color: #4caf50; }
    #intervals-result.wrong   { color: #f44336; }
    #intervals-roots {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 0.35rem;
      width: 100%;
      max-width: 360px;
    }
    #intervals-actions { display: flex; gap: 1.4rem; margin-top: 0.2rem; }
    #intervals-next { visibility: hidden; }
    #intervals-next.visible { visibility: visible; }

    /* =========================================================
       Learn + Practice — modern app styling
       ========================================================= */
    :root {
      --bg: #0e0f13;
      --card: #1a1c22;
      --card2: #23262f;
      --line: #2c2f38;
      --text: #eef0f4;
      --muted: #9aa0ac;
      --accent: #6c8cff;
      --good: #4caf50;
      --bad: #f44336;
    }

    /* Full-width, top-aligned, scrollable app-style tabs. */
    body.mode-learn, body.mode-practice, body.mode-tune, body.mode-yesno, body.mode-stats, body.mode-apgames, body.mode-microtone { background: var(--bg); }
    body.mode-learn, body.mode-practice, body.mode-tune, body.mode-yesno, body.mode-stats, body.mode-apgames, body.mode-microtone {
      justify-content: flex-start;
    }
    body.mode-learn #note, body.mode-practice #note, body.mode-tune #note, body.mode-yesno #note, body.mode-stats #note, body.mode-apgames #note, body.mode-microtone #note,
    body.mode-learn #debug, body.mode-practice #debug, body.mode-tune #debug, body.mode-yesno #debug, body.mode-stats #debug, body.mode-apgames #debug, body.mode-microtone #debug,
    body.mode-learn #start, body.mode-practice #start, body.mode-tune #start, body.mode-yesno #start, body.mode-stats #start, body.mode-apgames #start, body.mode-microtone #start,
    body.mode-learn #status, body.mode-practice #status, body.mode-tune #status, body.mode-yesno #status, body.mode-stats #status, body.mode-apgames #status, body.mode-microtone #status { display: none !important; }

    #learn, #practice, #tune, #yesno, #stats, #apgames, #microtone {
      display: none;
      width: 100%;
      max-width: 520px;
      padding: 0 1rem 2rem;
      animation: fadeIn 0.2s ease;
    }
    #learn.active, #practice.active, #tune.active, #yesno.active, #stats.active, #apgames.active, #microtone.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .screen-title { font-size: 1.9rem; font-weight: 800; margin: 0.2rem 0 0.3rem; letter-spacing: -0.02em; }
    .screen-sub   { color: var(--muted); font-size: 0.95rem; margin: 0 0 1.2rem; line-height: 1.4; }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 1rem 1.1rem;
      margin-bottom: 1rem;
    }
    .panel-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.7rem; display: flex; align-items: baseline; gap: 0.5rem; }
    .panel-sub { color: var(--muted); font-weight: 500; font-size: 0.8rem; }

    .primary-btn {
      width: 100%;
      padding: 1.05rem;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #6c8cff, #8b5cf6);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      touch-action: manipulation;
      margin: 0.4rem 0 1rem;
      box-shadow: 0 8px 24px rgba(108,140,255,0.28);
    }
    .primary-btn:disabled { opacity: 0.45; box-shadow: none; }
    .primary-btn:active:not(:disabled) { transform: translateY(1px); }

    .icon-btn {
      background: var(--card2); color: var(--text);
      border: 1px solid var(--line); border-radius: 12px;
      padding: 0.45rem 0.8rem; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; touch-action: manipulation;
    }

    /* ---- Learn home cards ---- */
    .learn-cards { display: flex; flex-direction: column; gap: 0.7rem; }
    .learn-card {
      display: flex; align-items: center; gap: 0.9rem; text-align: left;
      background: var(--card); border: 1px solid var(--line);
      border-radius: 18px; padding: 1rem; cursor: pointer; color: var(--text);
      touch-action: manipulation; width: 100%;
    }
    .learn-card:active:not(.locked) { background: var(--card2); }
    .learn-card.locked { opacity: 0.5; cursor: default; }
    .learn-card-icon { font-size: 1.7rem; width: 2.4rem; text-align: center; flex: 0 0 auto; }
    .learn-card-body { flex: 1; min-width: 0; }
    .learn-card-title { font-weight: 700; font-size: 1.1rem; }
    .learn-card-blurb { color: var(--muted); font-size: 0.85rem; line-height: 1.35; margin-top: 0.15rem; }
    .learn-card-sub { color: var(--accent); font-size: 0.78rem; font-weight: 600; margin-top: 0.4rem; }
    .learn-card-chev { font-size: 1.6rem; color: var(--muted); flex: 0 0 auto; }

    /* ---- Trainer shell (Learn) ---- */
    .trainer { display: flex; flex-direction: column; gap: 0.9rem; }
    .trainer-top { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .trainer-title { font-weight: 700; font-size: 1.05rem; }
    .trainer-score { color: var(--muted); font-size: 0.85rem; font-variant-numeric: tabular-nums; }
    .trainer-progress { height: 8px; background: var(--card2); border-radius: 999px; overflow: hidden; }
    .trainer-progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg,#6c8cff,#8b5cf6); transition: width 0.3s; }
    .trainer-prompt { text-align: center; font-size: 1.15rem; font-weight: 600; min-height: 2.6em; display: flex; align-items: center; justify-content: center; line-height: 1.35; }
    .trainer-prompt b { color: var(--accent); }
    .trainer-answers { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; }
    .trainer-answers > .answer-btn, .trainer-answers > div { }
    #learn-answers { display: grid; grid-template-columns: repeat(auto-fit, minmax(64px, 1fr)); gap: 0.4rem; width: 100%; }
    #learn-answers .answer-btn { width: 100%; }
    .trainer-actions { display: flex; justify-content: center; gap: 1.4rem; margin-top: 0.3rem; }
    .autonext { display: flex; align-items: center; justify-content: center; gap: 0.45rem; margin-top: 0.5rem; color: var(--muted); font-size: 0.85rem; cursor: pointer; }
    .autonext input { width: 1.05rem; height: 1.05rem; accent-color: var(--accent); }
    .learn-opts { display: flex; gap: 1.4rem; justify-content: center; flex-wrap: wrap; }
    .learn-award { text-align: center; font-weight: 700; color: #f2c94c; min-height: 0; max-height: 0; overflow: hidden; opacity: 0; transition: all 0.3s; }
    .learn-award.show { min-height: 1.4em; max-height: 3em; opacity: 1; margin: 0.3rem 0; }
    .big-note { display: block; font-size: 5rem; font-weight: 800; line-height: 1.05; color: #fff; }
    #learn-decomp-row { margin-top: -0.2rem; }
    .yn-config { margin-top: 1.2rem; padding-top: 0.9rem; border-top: 1px solid var(--line); width: 100%; }
    .yn-pick-label { color: var(--muted); font-size: 0.8rem; margin: 0.7rem 0 0.4rem; }
    .yn-pick { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 0.35rem; }
    .yn-chip { padding: 0.45rem 0; border-radius: 8px; border: 2px solid var(--line); background: var(--card2); color: #667; font-weight: 700; font-size: 0.85rem; cursor: pointer; touch-action: manipulation; }
    .yn-chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
    .note-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 0.4rem; width: 100%; }
    .note-grid.wide { grid-template-columns: repeat(auto-fit, minmax(64px, 1fr)); gap: 0.5rem; }
    #learn-answers .note-grid .answer-btn { width: 100%; }
    .trainer-sess { text-align: center; color: var(--muted); font-size: 0.8rem; font-variant-numeric: tabular-nums; margin-top: 0.3rem; }
    .pattern-picker { text-align: center; margin-bottom: 0.7rem; }
    .pattern-picker label { color: var(--muted); font-size: 0.9rem; display: inline-flex; gap: 0.5rem; align-items: center; }
    .pattern-picker select { background: var(--card2); color: var(--text); border: 1px solid var(--line); border-radius: 999px; padding: 0.4rem 0.9rem; font-family: inherit; font-size: 0.95rem; }

    /* ---- Stats ---- */
    .stat-note-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
    .stat-note { background: var(--card2); border: 1px solid var(--line); border-radius: 12px; padding: 0.6rem 0.3rem; text-align: center; }
    .stat-note.started { border-color: #5b6; }
    .stat-note.mastered { border-color: #f2c94c; background: rgba(242,201,76,0.12); }
    .stat-note-name { font-weight: 700; font-size: 1rem; }
    .stat-note-pct { color: var(--accent); font-size: 0.9rem; font-weight: 700; }
    .stat-note-sub { color: var(--muted); font-size: 0.7rem; }
    .award { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--line); font-size: 0.9rem; }
    .award:last-child { border-bottom: none; }
    .award span { color: var(--muted); font-size: 0.78rem; }

    .tag { font-size: 0.7rem; padding: 0.12rem 0.5rem; border-radius: 999px; background: rgba(108,140,255,0.2); color: #a9bcff; font-weight: 700; vertical-align: middle; }
    .tag.clean { background: rgba(123,216,143,0.18); color: #9be4ac; }

    .voicing-choices { display: grid; grid-template-columns: repeat(auto-fit, minmax(84px, 1fr)); gap: 0.6rem; width: 100%; grid-column: 1 / -1; }
    .voicing-btn {
      display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
      padding: 1rem 0.6rem; border-radius: 16px; border: 2px solid var(--line);
      background: var(--card2); color: var(--text); cursor: pointer; touch-action: manipulation;
    }
    .voicing-btn:active { border-color: var(--accent); }
    .voicing-btn.study-hl { border-color: var(--good); box-shadow: 0 0 0 2px rgba(76,175,80,0.35); }
    .voicing-btn b { font-size: 1.15rem; }
    .voicing-btn span { color: var(--muted); font-size: 0.85rem; }
    .interval-picker { grid-column: 1 / -1; text-align: center; margin-top: 0.3rem; }
    .interval-picker label { color: var(--muted); font-size: 0.85rem; display: inline-flex; gap: 0.4rem; align-items: center; }
    .interval-picker select {
      background: var(--card2); color: var(--text); border: 1px solid var(--line);
      border-radius: 999px; padding: 0.35rem 0.7rem; font-family: inherit; font-size: 0.85rem;
    }

    /* Per-note mastery readout (Pitches phase) */
    .mastery-strip {
      grid-column: 1 / -1;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(38px, 1fr));
      gap: 0.3rem; margin-top: 0.6rem;
    }
    .mastery-cell { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; font-size: 0.7rem; color: var(--muted); }
    .mastery-cell.mid  { color: #d9c26a; }
    .mastery-cell.done { color: var(--good); }
    .mastery-bar { width: 100%; height: 4px; background: var(--card2); border-radius: 999px; overflow: hidden; }
    .mastery-bar > div { height: 100%; background: currentColor; transition: width 0.3s; }

    /* ---- Practice: stats + factions ---- */
    .stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; margin-bottom: 1rem; }
    .stat-card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 1.1rem; text-align: center; }
    .stat-big { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; }
    .stat-label { color: var(--muted); font-size: 0.82rem; margin-top: 0.15rem; }

    .faction-row { display: grid; grid-template-columns: 6.5rem 1fr 2.6rem; align-items: center; gap: 0.6rem; margin: 0.45rem 0; }
    .faction-label { font-size: 0.85rem; color: var(--text); }
    .faction-track { height: 10px; background: var(--card2); border-radius: 999px; overflow: hidden; }
    .faction-fill { height: 100%; width: 0%; border-radius: 999px; transition: width 0.4s; }
    .faction-val { text-align: right; color: var(--muted); font-size: 0.8rem; font-variant-numeric: tabular-nums; }
    .suggestion { margin-top: 0.8rem; padding: 0.7rem 0.8rem; background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.3); border-radius: 12px; font-size: 0.85rem; line-height: 1.4; }
    .suggestion b { color: #c4b5fd; }

    .hist-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid var(--line); font-size: 0.88rem; color: var(--muted); }
    .hist-row:last-child { border-bottom: none; }
    .hist-empty { color: var(--muted); font-size: 0.88rem; }

    /* ---- Practice: setup ---- */
    .setup-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .chip-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .chip {
      padding: 0.5rem 1rem; border-radius: 999px; border: 2px solid var(--line);
      background: var(--card2); color: var(--muted); font-weight: 700; cursor: pointer; touch-action: manipulation;
    }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .custom-time { display: flex; align-items: center; gap: 0.8rem; margin-top: 0.9rem; }
    .custom-time input[type=range] { flex: 1; accent-color: var(--accent); }
    #pr-range-val { color: var(--text); font-weight: 700; font-size: 0.9rem; min-width: 4.2rem; text-align: right; }

    .skill-list { display: flex; flex-direction: column; gap: 0.55rem; }
    .skill-row { border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: var(--card2); }
    .skill-row.on { border-color: var(--accent); }
    .skill-toggle { display: flex; align-items: center; gap: 0.7rem; width: 100%; padding: 0.8rem; background: none; border: none; color: var(--text); cursor: pointer; text-align: left; touch-action: manipulation; }
    .skill-check { width: 1.4rem; height: 1.4rem; border-radius: 7px; border: 2px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: #fff; flex: 0 0 auto; }
    .skill-row.on .skill-check { background: var(--accent); border-color: var(--accent); }
    .skill-icon { font-size: 1.2rem; }
    .skill-name { font-weight: 600; display: flex; flex-direction: column; }
    .skill-faction { font-size: 0.72rem; color: var(--muted); font-weight: 500; }
    .skill-mode { display: flex; gap: 0.4rem; padding: 0 0.8rem 0.8rem; }
    .skill-mode.hidden { display: none; }
    .seg { flex: 1; padding: 0.5rem; border-radius: 10px; border: 1px solid var(--line); background: var(--card); color: var(--muted); font-size: 0.8rem; font-weight: 600; cursor: pointer; touch-action: manipulation; }
    .seg.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .plan-list { display: flex; flex-direction: column; gap: 0.35rem; }
    .plan-seg { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 0.4rem 0.6rem; background: var(--card2); border-radius: 10px; }
    .plan-seg.brk { color: var(--muted); background: transparent; font-size: 0.8rem; }

    /* ---- Practice: runner ---- */
    .runner { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0.5rem; }
    .runner-sub { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }
    .runner-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.01em; }
    .runner-clock { font-size: 4.2rem; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.03em; color: var(--accent); line-height: 1.1; }
    .runner[style*="--accent"] .runner-clock { color: var(--accent); }
    .runner-ring { width: 100%; max-width: 320px; height: 8px; background: var(--card2); border-radius: 999px; overflow: hidden; }
    .runner-ring-bar { height: 100%; width: 0%; background: var(--accent); transition: width 1s linear; }
    .runner-body { margin: 1rem 0 0.5rem; width: 100%; max-width: 380px; }
    .guide-note { color: var(--muted); font-size: 0.95rem; line-height: 1.5; }
    .guide-content { margin-top: 0.8rem; }
    .read-line { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 1rem; font-size: 1rem; line-height: 1.6; }
    .read-line.big { font-size: 1.4rem; font-weight: 700; }
    .read-line .notes { font-family: ui-monospace, Menlo, monospace; font-size: 1.3rem; letter-spacing: 0.1em; color: var(--text); }
    .runner-controls { display: flex; gap: 1.6rem; margin-top: 0.8rem; }
    .runner-controls .ghost { font-size: 1rem; color: var(--text); }
    .runner-next { color: var(--muted); font-size: 0.85rem; margin-top: 0.6rem; }

    /* ---- Practice: summary ---- */
    .summary { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .summary-emoji { font-size: 3.5rem; margin: 1rem 0 0.3rem; }
    .summary .panel, .summary .stat-cards { width: 100%; }

    /* ---- Tune Learner ---- */
    .tune-session { display: flex; flex-direction: column; }
    .line-toggle { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .line-toggle .seg { flex: 1; padding: 0.6rem; }
    .tune-bar-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 20px;
      padding: 1.4rem 1rem; text-align: center; margin-bottom: 1rem;
    }
    .tune-bar-num { color: var(--muted); font-size: 0.85rem; }
    .tune-chord { font-size: 2.6rem; font-weight: 800; letter-spacing: -0.02em; margin: 0.3rem 0; }
    .tune-notes {
      font-family: ui-monospace, Menlo, monospace; font-size: 1.1rem;
      color: var(--accent); letter-spacing: 0.04em; min-height: 1.4em;
    }
    .tune-loop { color: var(--muted); font-size: 0.85rem; margin-top: 0.7rem; }
    .tune-tempo { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; color: var(--muted); font-size: 0.85rem; }
    .tune-tempo input[type=range] { flex: 1; accent-color: var(--accent); }
    .tune-tempo #tune-bpm-val { min-width: 5rem; text-align: right; color: var(--text); font-weight: 700; }
    .tune-actions { display: flex; justify-content: center; gap: 1.2rem; margin-top: 0.4rem; flex-wrap: wrap; }
    /* iReal-style chart */
    .chart { margin-bottom: 0.8rem; }
    .chart-sec { margin-bottom: 0.7rem; }
    .chart-label { color: var(--accent); font-weight: 800; font-size: 0.85rem; margin-bottom: 0.25rem; }
    .chart-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.3rem; }
    .chart-cell {
      border: 1px solid var(--line); border-radius: 8px; background: var(--card);
      min-height: 3rem; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.95rem; text-align: center; padding: 0.3rem; cursor: pointer;
      touch-action: manipulation; line-height: 1.15;
    }
    .chart-cell.cur { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(108,140,255,0.35); }
    .chart-cell { flex-direction: column; gap: 0.15rem; }
    .cc-ch { font-weight: 700; }
    .cc-mel { font-size: 0.62rem; font-weight: 500; opacity: 0.72; font-family: ui-monospace, Menlo, monospace; letter-spacing: 0.02em; line-height: 1.1; }
    .tune-hud { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 0.8rem; }
    .tune-controls { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
    .tune-controls .mini { display: flex; align-items: center; gap: 0.4rem; color: var(--muted); font-size: 0.85rem; }
    .tune-controls select { background: var(--card2); color: var(--text); border: 1px solid var(--line); border-radius: 999px; padding: 0.35rem 0.7rem; font-family: inherit; font-size: 0.85rem; }
    .tune-controls .line-toggle { margin: 0; flex: 1; min-width: 160px; }
    .tune-checks { display: flex; gap: 1.4rem; margin-bottom: 1rem; color: var(--text); font-size: 0.9rem; }
    .tune-checks label { display: flex; align-items: center; gap: 0.4rem; }
    .tune-checks input { width: 1.05rem; height: 1.05rem; accent-color: var(--accent); }
    .sing-target { display: flex; flex-wrap: wrap; gap: 0.35rem; justify-content: center; margin-bottom: 1rem; }
    .sng { padding: 0.3rem 0.55rem; border-radius: 8px; background: var(--card2); color: var(--muted); font-family: ui-monospace, Menlo, monospace; font-size: 0.9rem; }
    .sng.hit { background: var(--good); color: #072; font-weight: 700; }

    /* ---- Yes / No ---- */
    .yn { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .yn .trainer-score { margin: 0.2rem 0 0.6rem; }
    .yn-note { font-size: 7rem; font-weight: 800; line-height: 1; letter-spacing: -0.04em; color: #fff; }
    .yn-sub { color: var(--muted); font-size: 0.95rem; margin: 0.8rem 0 1.2rem; }
    .yn-answers { display: flex; gap: 1rem; }
    .yn-answers .answer-btn { min-width: 6rem; }
    .yn-result { min-height: 1.5em; margin-top: 1.1rem; font-size: 0.95rem; font-weight: 600; color: #ddd; }
    .yn-result.correct { color: var(--good); }
    .yn-result.wrong { color: var(--bad); }
    .yn-result b { color: var(--accent); }

    /* ---- AP Mini Games ---- */
    .apg { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .apg-score { color: var(--muted); font-size: 0.95rem; font-variant-numeric: tabular-nums; margin: 0.2rem 0 0.4rem; }
    .apg-sub { color: var(--muted); font-size: 0.95rem; margin: 0.5rem 0 0.9rem; min-height: 1.3em; }
    .apg-sub.ok { color: var(--good); font-weight: 700; }
    .apg-sub.wrong { color: var(--bad); }
    .apg-result { min-height: 1.5em; margin: 0.8rem 0; font-size: 0.9rem; font-weight: 600; font-family: ui-monospace, Menlo, monospace; color: #ddd; }
    .apg-result.ok { color: var(--good); }
    .apg-result.wrong { color: var(--bad); }
    .apg-opts { display: flex; gap: 1.3rem; align-items: center; justify-content: center; margin-top: 1rem; flex-wrap: wrap; color: var(--muted); font-size: 0.85rem; }
    .apg-opts .mini { display: flex; align-items: center; gap: 0.4rem; }
    .apg-opts select { background: var(--card2); color: var(--text); border: 1px solid var(--line); border-radius: 999px; padding: 0.3rem 0.7rem; font-family: inherit; font-size: 0.85rem; }
    .apg .note-grid { max-width: 380px; }
    .apg-live { font-family: ui-monospace, Menlo, monospace; font-size: 1.1rem; color: var(--accent); min-height: 1.4em; }
    /* Cents needle */
    .needle { position: relative; width: 100%; max-width: 320px; height: 30px; background: var(--card2); border: 1px solid var(--line); border-radius: 8px; margin: 0.6rem 0; overflow: hidden; }
    .needle-zone { position: absolute; top: 0; bottom: 0; background: rgba(76,175,80,0.22); }
    .needle-center { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--muted); transform: translateX(-1px); }
    .needle-mark { position: absolute; top: 3px; bottom: 3px; width: 4px; border-radius: 2px; background: var(--accent); transform: translateX(-2px); transition: left 0.06s linear, background 0.1s; opacity: 0; }

    /* ---- Microtone keyboard ---- */
    .micro-kbd { display: flex; align-items: flex-end; gap: 2px; width: 100%; overflow-x: auto; padding: 0.5rem 0; margin: 0.6rem 0; }
    .mkey { flex: 1 0 auto; min-width: 20px; border: 1px solid var(--line); border-radius: 0 0 6px 6px; cursor: pointer; touch-action: manipulation; font-size: 0.6rem; color: var(--muted); padding: 0.2rem 0; }
    .mkey.et { height: 90px; background: var(--card2); color: var(--text); font-weight: 700; }
    .mkey.qt { height: 58px; background: #14161c; }
    .mkey.ref { background: var(--accent); color: #fff; border-color: var(--accent); }
    .mkey.correct { background: var(--good); color: #072; border-color: var(--good); }
    .mkey.wrong { background: var(--bad); color: #fff; border-color: var(--bad); }

    /* ---- Status ---- */
    #status {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 0.8rem);
      left: 0; right: 0;
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      padding: 0 1rem;
    }
    #status.error { color: #f66; }
  </style>
</head>
<body>
  <div id="mode-toggle">
    <button class="mode-btn active" data-mode="passive"   type="button">🎤 Passive</button>
    <button class="mode-btn"        data-mode="quiz"      type="button">🎯 Quiz</button>
    <button class="mode-btn"        data-mode="intervals" type="button">🎼 Intervals</button>
    <button class="mode-btn"        data-mode="learn"     type="button">📚 Learn</button>
    <button class="mode-btn"        data-mode="practice"  type="button">🗓️ Practice</button>
    <button class="mode-btn"        data-mode="tune"      type="button">🎶 Tunes</button>
    <button class="mode-btn"        data-mode="apgames"   type="button">🧠 AP Games</button>
    <button class="mode-btn"        data-mode="microtone" type="button">🔬 Microtone</button>
    <button class="mode-btn"        data-mode="stats"     type="button">📊 Stats</button>
  </div>

  <div id="note" class="idle">—</div>
  <div id="debug">freq: — Hz &nbsp; clarity: — &nbsp; rms: —</div>

  <!-- Passive mode -->
  <button id="start" type="button">Start</button>

  <!-- Quiz mode -->
  <div id="quiz">
    <div id="quiz-submodes">
      <button class="submode-btn active" data-submode="sample" type="button">Sample</button>
      <button class="submode-btn"        data-submode="pitch"  type="button">Pitch</button>
      <button class="submode-btn"        data-submode="amount" type="button">Amount</button>
    </div>

    <div id="quiz-score">0 / 0</div>
    <div id="quiz-result"></div>

    <div id="ans-sample" class="answer-group active">
      <button class="answer-btn" id="btn-sample-intune" type="button">In tune ✓</button>
      <button class="answer-btn" id="btn-sample-off"    type="button">Off-pitch ✗</button>
    </div>

    <div id="ans-pitch" class="answer-group">
      <button class="answer-btn" id="btn-pitch-match"   type="button">Matches label ✓</button>
      <button class="answer-btn" id="btn-pitch-nomatch" type="button">Doesn't match ✗</button>
    </div>

    <div id="ans-amount" class="answer-group">
      <button class="answer-btn amount-btn" data-cents="-100" type="button">½↓</button>
      <button class="answer-btn amount-btn" data-cents="-50"  type="button">¼↓</button>
      <button class="answer-btn amount-btn" data-cents="0"    type="button">OG</button>
      <button class="answer-btn amount-btn" data-cents="50"   type="button">¼↑</button>
      <button class="answer-btn amount-btn" data-cents="100"  type="button">½↑</button>
    </div>

    <div id="followup">
      <div class="followup-label">What pitch did you hear?</div>
      <div id="followup-btns"></div>
      <button id="followup-skip" class="ghost" type="button">skip →</button>
    </div>

    <div id="quiz-actions">
      <button id="quiz-replay" class="ghost" type="button">play again ↺</button>
      <button id="quiz-next"   class="ghost" type="button">next →</button>
    </div>
  </div>

  <!-- Intervals mode -->
  <div id="intervals">
    <div id="intervals-controls">
      <label class="ctl-label">Interval
        <select id="interval-type">
          <option value="1">m2 — minor 2nd</option>
          <option value="2">M2 — major 2nd</option>
          <option value="3">m3 — minor 3rd</option>
          <option value="4" selected>M3 — major 3rd</option>
          <option value="5">P4 — perfect 4th</option>
          <option value="6">TT — tritone</option>
          <option value="7">P5 — perfect 5th</option>
          <option value="8">m6 — minor 6th</option>
          <option value="9">M6 — major 6th</option>
          <option value="10">m7 — minor 7th</option>
          <option value="11">M7 — major 7th</option>
          <option value="12">P8 — octave</option>
        </select>
      </label>
    </div>
    <div id="intervals-score">0 / 0</div>
    <div id="intervals-result">Which note is the root?</div>
    <div id="intervals-roots"></div>
    <div id="intervals-actions">
      <button id="intervals-hint"   class="ghost" type="button">hint ♪</button>
      <button id="intervals-replay" class="ghost" type="button">play again ↺</button>
      <button id="intervals-next"   class="ghost" type="button">next →</button>
    </div>
  </div>

  <!-- Learn mode (rendered by learn.js) -->
  <div id="learn"></div>

  <!-- Practice Routine (rendered by practice.js) -->
  <div id="practice"></div>

  <!-- Tune Learner (rendered by tune.js) -->
  <div id="tune"></div>

  <!-- Yes / No (standalone; now also a Learn phase) -->
  <div id="yesno"></div>

  <!-- Stats (rendered by stats.js) -->
  <div id="stats"></div>

  <!-- AP Mini Games (rendered by apgames.js) -->
  <div id="apgames"></div>

  <!-- Microtone (rendered by microtone.js) -->
  <div id="microtone"></div>

  <div id="status">Tap Start to begin</div>

  <script type="module" src="./app.js"></script>
</body>
</html>
